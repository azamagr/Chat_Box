<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat Box</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ece5dd;
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

/* Chat Box */
.chat {
    width: 300px;
    height: 500px;
    background: white;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.header {
    background: #075e54;
    color: white;
    padding: 10px;
    text-align: center;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    padding: 8px 12px;
    margin: 5px 0;
    border-radius: 10px;
    max-width: 70%;
    clear: both;
}

.left {
    background: #fff;
    float: left;
}

.right {
    background: #dcf8c6;
    float: right;
}

/* Input */
.input {
    display: flex;
}

.input input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

.input button {
    padding: 10px;
    border: none;
    background: #25d366;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<!-- USER A -->
<div class="chat">
    <div class="header">👨 HE </div>
    <div class="messages" id="chatA"></div>
    <div class="input">
        <input type="text" id="msgA" placeholder="Type...">
        <button onclick="sendA()">Send</button>
    </div>
</div>

<!-- USER B -->
<div class="chat">
    <div class="header">👩 SHE </div>
    <div class="messages" id="chatB"></div>
    <div class="input">
        <input type="text" id="msgB" placeholder="Type...">
        <button onclick="sendB()">Send</button>
    </div>
</div>

<script>
function sendA(){
    let msg = $("#msgA").val().trim();
    if(msg === "") return;

    // A side (right)
    $("#chatA").append('<div class="msg right">'+msg+'</div>');

    // B side (left)
    $("#chatB").append('<div class="msg left">'+msg+'</div>');

    $("#msgA").val("");
    scroll();
}

function sendB(){
    let msg = $("#msgB").val().trim();
    if(msg === "") return;

    // B side (right)
    $("#chatB").append('<div class="msg right">'+msg+'</div>');

    // A side (left)
    $("#chatA").append('<div class="msg left">'+msg+'</div>');

    $("#msgB").val("");
    scroll();
}

function scroll(){
    $(".messages").scrollTop(function(){
        return this.scrollHeight;
    });
}
</script>

</body>
</html>
